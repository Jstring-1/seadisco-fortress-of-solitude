<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeaDisco — Music Rabbit Hole Search</title>
  <meta name="description" content="SeaDisco is an advanced Discogs music search engine. Search artists, releases, labels and dive deep into jazz, blues, world music, and more." />
  <meta name="keywords" content="discogs search, vinyl search, music database, jazz, blues, world music, record search, artist search, label search" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://seadisco.com/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://seadisco.com/" />
  <meta property="og:title" content="SeaDisco — Music Rabbit Hole Search" />
  <meta property="og:description" content="Advanced Discogs music search. Dive deep into artists, releases, and labels across jazz, blues, world music, and more." />
  <meta property="og:image" content="https://seadisco.com/seadisco-logo.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="SeaDisco — Music Rabbit Hole Search" />
  <meta name="twitter:description" content="Advanced Discogs music search. Dive deep into artists, releases, and labels." />
  <meta name="twitter:image" content="https://seadisco.com/seadisco-logo.png" />

  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/style.css" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-GYEHWV1B03"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-GYEHWV1B03');
  </script>
</head>
<body>

<div id="site-header">
  <a href="https://seadisco.com"><img src="/seadisco-logo.png" alt="SeaDisco" /></a>
  <div id="header-bar">
    <div id="site-tagline">Music Rabbit Hole Pathway</div>
    <div id="auth-bar"><span id="auth-status"></span></div>
  </div>
</div>

<main>
  <div class="search-row">
    <input type="text" id="query" placeholder="Search artists, releases, labels…" autocomplete="off" />
  </div>

  <div style="margin-bottom:0.75rem;margin-top:0.25rem">
    <button type="button" id="advanced-toggle" onclick="toggleAdvanced()" style="background:none;border:none;padding:0;font-size:0.78rem;color:#666;cursor:pointer;display:flex;align-items:center;gap:0.3rem" onmouseover="this.style.color='#ccc'" onmouseout="this.style.color='#666'">
      <span id="advanced-arrow">▶</span> Advanced
    </button>
  </div>
  <div id="advanced-panel" style="display:none">
    <div class="filters">
      <label>Artist <input type="text" id="f-artist" placeholder="e.g. Miles Davis" oninput="currentArtistId=null" /></label>
      <label>Release <input type="text" id="f-release" placeholder="e.g. Kind of Blue" /></label>
      <label>Label <input type="text" id="f-label" placeholder="e.g. Columbia" /></label>
      <label>Year <input type="text" id="f-year" placeholder="e.g. 1959" /></label>
    </div>
    <div class="filters" style="margin-top:0.4rem">
      <label>Format
        <select id="f-format">
          <option value="Vinyl">Vinyl</option>
          <option value="">All Formats</option>
          <option value="CD">CD</option>
          <option value="Cassette">Cassette</option>
          <option value="Digital">Digital</option>
        </select>
      </label>
      <label>Genre
        <select id="f-genre" onchange="populateStyles()">
          <option value="">Any</option>
          <option>Blues</option>
          <option>Brass &amp; Military</option>
          <option>Children's</option>
          <option>Classical</option>
          <option>Electronic</option>
          <option>Folk, World, &amp; Country</option>
          <option>Funk / Soul</option>
          <option>Hip Hop</option>
          <option>Jazz</option>
          <option>Latin</option>
          <option>Non-Music</option>
          <option>Pop</option>
          <option>Reggae</option>
          <option>Rock</option>
          <option>Stage &amp; Screen</option>
        </select>
      </label>
      <label>Style
        <select id="f-style" disabled>
          <option value="">Any</option>
        </select>
      </label>
    </div>
  </div>
  <div class="type-sort-row">
    <span style="text-transform:uppercase;letter-spacing:0.05em;color:#555;flex-shrink:0">Results:</span>
    <div class="type-radios">
      <label style="display:flex;align-items:center;gap:0.25rem"><input type="radio" name="result-type" value="" checked> All</label>
      <label style="display:flex;align-items:center;gap:0.25rem"><input type="radio" name="result-type" value="master"> Masters</label>
      <label style="display:flex;align-items:center;gap:0.25rem"><input type="radio" name="result-type" value="release"> Releases</label>
      <label style="display:flex;align-items:center;gap:0.25rem"><input type="radio" name="result-type" value="artist"> Artists</label>
      <label style="display:flex;align-items:center;gap:0.25rem"><input type="radio" name="result-type" value="label"> Labels</label>
    </div>
  </div>
  <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem;margin-top:0.5rem;align-items:center">
    <label class="sort-label" style="flex-shrink:0">
      Sort
      <select id="f-sort" style="font-size:0.78rem;padding:0.3rem 0.4rem;color-scheme:dark">
        <option value="">Relevance</option>
        <option value="year:asc">Year ↑</option>
        <option value="year:desc">Year ↓</option>
        <option value="title:asc">Title A→Z</option>
        <option value="title:desc">Title Z→A</option>
        <option value="label:asc">Label A→Z</option>
      </select>
    </label>
    <button id="search-btn" onclick="doSearch(1)" style="flex:1">Search</button>
  </div>
  <div style="display:flex;align-items:center;gap:0.4rem;font-size:0.78rem;color:#555;margin-bottom:1.25rem;min-height:1em">
    <button type="button" onclick="clearForm()" title="Clear form" style="background:none;border:none;padding:0;margin:0;font-size:0.92rem;color:#555;cursor:pointer;line-height:1;display:flex;align-items:center" onmouseover="this.style.color='#ccc'" onmouseout="this.style.color='#555'">✕</button>
    <span id="powered-by">Powered by <a href="https://www.discogs.com" target="_blank" rel="noopener" style="color:#666;text-decoration:none">Discogs</a>, <a href="https://www.anthropic.com" target="_blank" rel="noopener" style="color:#666;text-decoration:none">Claude</a>, and <a href="https://www.wikipedia.org" target="_blank" rel="noopener" style="color:#666;text-decoration:none">Wikipedia</a></span>
    <span id="search-pipe" style="color:#333;display:none">|</span>
    <span id="search-desc"></span>
    <span id="type-pipe" style="color:#333;display:none">|</span>
    <span id="type-desc"></span>
    <span id="sort-pipe" style="color:#333;display:none">|</span>
    <span id="sort-desc"></span>
  </div>

  <div id="artist-alts"></div>
  <div id="blurb"></div>
  <div id="alts-popup-backdrop" onclick="closeAltsPopup()"></div>
  <div id="alts-popup"><h4>Other artists</h4></div>
  <div id="status"></div>
  <div id="results"></div>
  <div id="pagination" style="display:none">
    <button id="prev-btn" onclick="doSearch(currentPage - 1)">← Prev</button>
    <span id="page-info"></span>
    <button id="next-btn" onclick="doSearch(currentPage + 1)">Next →</button>
  </div>
  <div id="recent-feed" style="display:none"></div>
</main>


<div id="modal-overlay">
  <div id="modal-box">
    <button id="modal-close" onclick="closeModal()">×</button>
    <button class="popup-share" onclick="sharePopup(this)">share</button>
    <div id="modal-loading">Loading…</div>
    <div id="album-info"></div>
  </div>
</div>

<div id="version-overlay">
  <div id="version-box">
    <button id="version-close" onclick="closeVersionPopup()">×</button>
    <button class="popup-share" onclick="sharePopup(this)">share</button>
    <div id="version-loading" style="padding:2rem;text-align:center;color:var(--muted)">Loading…</div>
    <div id="version-info"></div>
  </div>
</div>

<div id="bio-full-overlay">
  <div id="bio-full-box">
    <button id="bio-full-close" onclick="closeBioFull()">×</button>
    <button class="popup-share" onclick="sharePopup(this)">share</button>
    <div id="bio-full-name"></div>
    <div id="bio-full-text"></div>
  </div>
</div>

<div id="video-overlay">
  <div id="video-wrap">
    <div id="video-box">
      <button id="video-close" onclick="closeVideo()">×</button>
      <button class="popup-share" onclick="sharePopup(this)">share</button>
      <div id="video-player"></div>
    </div>
    <div id="video-footer">
      <div id="video-title"></div>
      <div id="video-nav">
        <button id="video-prev" onclick="videoPrev()" disabled>&#8592; prev</button>
        <button id="video-next" onclick="playNextVideo()" disabled>next &#8594;</button>
      </div>
    </div>
  </div>
</div>

<div id="lightbox-overlay" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">×</button>
  <button id="lightbox-prev" onclick="lightboxStep(event,-1)">&#8592;</button>
  <img id="lightbox-img" src="" alt="" />
  <button id="lightbox-next" onclick="lightboxStep(event,1)">&#8594;</button>
  <div id="lightbox-counter"></div>
</div>

<script src="/app.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
