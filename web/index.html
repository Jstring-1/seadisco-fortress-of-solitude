<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Discogs</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f0f;
      --surface:   #1a1a1a;
      --border:    #2e2e2e;
      --accent:    #e8a020;
      --accent-dim:#a06c10;
      --text:      #e2e2e2;
      --muted:     #888;
      --radius:    8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      padding: 0.6rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    header .inner {
      max-width: 900px;
      margin: 0 auto;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem 1.5rem;
    }

    footer {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 2rem;
      font-size: 0.75rem;
      color: #555;
      border-top: 1px solid var(--border);
    }

    footer a { color: #666; text-decoration: none; }
    footer a:hover { color: var(--muted); }

    /* ── Search form ── */
    .search-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
      padding: 0.65rem 1rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.9rem;
      padding: 0.65rem 0.75rem;
      outline: none;
      cursor: pointer;
    }

    button {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #000;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.65rem 1.4rem;
      transition: background 0.15s;
    }

    button:hover { background: #ffb833; }
    button:disabled { background: var(--accent-dim); cursor: not-allowed; }

    .filters {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .filters input[type="text"] {
      flex: 1;
      min-width: 120px;
      font-size: 0.85rem;
      padding: 0.45rem 0.75rem;
    }

    .filters label {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      flex: 1;
      min-width: 100px;
    }

    /* ── Status / error ── */
    #blurb {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 0.9rem 1.1rem;
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 1.25rem;
      display: none;
    }

    /* ── Video popup ── */
    #video-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    #video-overlay.open { display: flex; }

    #video-box {
      position: relative;
      width: 100%;
      max-width: 720px;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
    }

    #video-box iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #video-close {
      position: absolute;
      top: -2rem;
      right: 0;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.6rem;
      line-height: 1;
      cursor: pointer;
      padding: 0.1rem 0.4rem;
    }

    /* ── Modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    #modal-overlay.open { display: flex; }

    #modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-width: 620px;
      width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      position: relative;
    }

    #modal-close {
      position: sticky;
      top: 0.5rem;
      float: right;
      margin: 0.5rem 0.6rem 0 0;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      z-index: 1;
    }

    #modal-close:hover { color: var(--text); background: #333; }

    #modal-loading {
      padding: 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    #album-info { overflow: hidden; }

    #album-info .album-header {
      display: flex;
      gap: 1rem;
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }

    #album-info .album-cover {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
      background: #222;
    }

    #album-info .album-cover-placeholder {
      width: 90px;
      height: 90px;
      background: #222;
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--border);
      font-size: 2rem;
    }

    #album-info .album-cover {
      width: 130px;
      height: 130px;
    }

    #album-info .album-cover-placeholder {
      width: 130px;
      height: 130px;
    }

    #album-info .album-type-badge {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.1rem 0.4rem;
      display: inline-block;
      margin-bottom: 0.35rem;
    }

    #album-info .album-meta h2 {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 0.2rem;
      line-height: 1.3;
    }

    #album-info .album-meta .album-artist {
      color: var(--accent);
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }

    #album-info .album-detail-grid {
      display: grid;
      grid-template-columns: 4.5rem 1fr;
      gap: 0.15rem 0.5rem;
      font-size: 0.78rem;
    }

    #album-info .detail-label {
      color: var(--muted);
    }

    #album-info .album-tracklist {
      padding: 0.75rem 1rem;
    }

    #album-info .tracklist-heading {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    #album-info .track {
      display: flex;
      gap: 0.6rem;
      font-size: 0.82rem;
      padding: 0.2rem 0;
      border-bottom: 1px solid #222;
    }

    #album-info .track:last-child { border-bottom: none; }

    #album-info .track-pos {
      color: var(--muted);
      min-width: 2rem;
      text-align: right;
      flex-shrink: 0;
    }

    #album-info .track-title { flex: 1; }

    #album-info .track-dur {
      color: var(--muted);
      flex-shrink: 0;
    }

    #album-info .track-link {
      color: inherit;
      text-decoration: none;
    }

    #album-info .track-link:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    #album-info .album-extra {
      border-top: 1px solid var(--border);
      padding: 0.75rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    #album-info .album-meta-row {
      display: flex;
      gap: 0.75rem;
      font-size: 0.8rem;
    }

    #album-info .meta-label {
      color: var(--muted);
      min-width: 5rem;
      flex-shrink: 0;
    }

    #album-info .credit-role {
      color: var(--muted);
    }

    #album-info .album-notes {
      margin-top: 0.25rem;
      font-size: 0.8rem;
      line-height: 1.55;
      color: var(--muted);
    }

    #status {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
      min-height: 1.2em;
    }

    #status.error { color: #e05555; }

    /* ── Results grid ── */
    #results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.15s, transform 0.15s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: #222;
    }

    .card .thumb-placeholder {
      width: 100%;
      aspect-ratio: 1;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--border);
      font-size: 2.5rem;
    }

    .card-body {
      padding: 0.75rem 0.85rem 0.9rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .card-artist {
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 500;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-title {
      font-size: 0.875rem;
      font-weight: 600;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-sub {
      font-size: 0.75rem;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-format {
      font-size: 0.72rem;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      margin-top: auto;
      padding-top: 0.5rem;
      font-size: 0.7rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ── Pagination ── */
    #pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      margin-top: 2rem;
    }

    #pagination button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-weight: 500;
      padding: 0.5rem 1.2rem;
    }

    #pagination button:hover:not(:disabled) {
      border-color: var(--accent);
      background: var(--surface);
      color: var(--accent);
    }

    #page-info {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ── Shows popup ── */
    #shows-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 150;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    #shows-overlay.open { display: flex; }

    #shows-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-width: 500px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
      padding: 1.25rem 1.25rem 1rem;
    }

    #shows-close {
      position: absolute;
      top: 0.5rem;
      right: 0.6rem;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.4rem;
      cursor: pointer;
      padding: 0.1rem 0.4rem;
      line-height: 1;
      border-radius: 4px;
    }

    #shows-close:hover { color: var(--text); background: #333; }

    #shows-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 1rem;
      padding-right: 2rem;
    }

    .show-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
    }

    .show-row:last-child { border-bottom: none; }

    .show-date {
      color: var(--muted);
      min-width: 5rem;
      flex-shrink: 0;
      font-size: 0.78rem;
    }

    .show-info { flex: 1; }
    .show-venue { font-weight: 500; }
    .show-location { color: var(--muted); font-size: 0.75rem; }

    .show-ticket {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.75rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .show-ticket:hover { text-decoration: underline; }

    /* ── Bio full popup ── */
    #bio-full-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 160;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    #bio-full-overlay.open { display: flex; }

    #bio-full-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      max-width: 620px;
      width: 100%;
      max-height: 82vh;
      overflow-y: auto;
      position: relative;
      padding: 1.25rem 1.4rem 1.4rem;
    }

    #bio-full-close {
      position: absolute;
      top: 0.5rem;
      right: 0.6rem;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.4rem;
      cursor: pointer;
      padding: 0.1rem 0.4rem;
      line-height: 1;
      border-radius: 4px;
    }

    #bio-full-close:hover { color: var(--text); background: #333; }

    #bio-full-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.75rem;
      padding-right: 2rem;
    }

    #bio-full-text {
      font-size: 0.88rem;
      line-height: 1.65;
      color: var(--text);
    }

    .bio-artist-link {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px dotted var(--accent-dim);
      cursor: pointer;
    }

    .bio-artist-link:hover {
      color: #ffb833;
      border-bottom-color: #ffb833;
    }
  </style>
</head>
<body>

<header>
  <div class="inner">
    <h1>Search Discogs</h1>
  </div>
</header>

<main>
  <div class="search-row">
    <input type="text" id="query" placeholder="Search artists, releases, labels…" autocomplete="off" />
    <select id="type">
      <option value="">All types</option>
      <option value="release">Release</option>
      <option value="master">Master</option>
      <option value="artist">Artist</option>
      <option value="label">Label</option>
    </select>
  </div>

  <div class="filters">
    <label>Artist <input type="text" id="f-artist" placeholder="e.g. Miles Davis" /></label>
    <label>Release <input type="text" id="f-release" placeholder="e.g. Kind of Blue" /></label>
    <label>Year <input type="text" id="f-year" placeholder="e.g. 1973" /></label>
    <label>Label <input type="text" id="f-label" placeholder="e.g. Blue Note" /></label>
    <label>Genre
      <select id="f-genre">
        <option value="">Any</option>
        <option>Blues</option>
        <option>Brass &amp; Military</option>
        <option>Children's</option>
        <option>Classical</option>
        <option>Electronic</option>
        <option>Folk, World, &amp; Country</option>
        <option>Funk / Soul</option>
        <option>Hip Hop</option>
        <option>Jazz</option>
        <option>Latin</option>
        <option>Non-Music</option>
        <option>Pop</option>
        <option>Reggae</option>
        <option>Rock</option>
        <option>Stage &amp; Screen</option>
      </select>
    </label>
  </div>
  <button id="search-btn" onclick="doSearch(1)" style="width:100%;margin-bottom:0.75rem">Search</button>
  <div id="search-desc" style="font-size:0.78rem;color:#555;margin-bottom:1.25rem;min-height:1em"></div>

  <div id="artist-alts"></div>
  <div id="blurb"></div>
  <div id="status"></div>
  <div id="results"></div>
  <div id="pagination" style="display:none">
    <button id="prev-btn" onclick="doSearch(currentPage - 1)">← Prev</button>
    <span id="page-info"></span>
    <button id="next-btn" onclick="doSearch(currentPage + 1)">Next →</button>
  </div>
</main>

<footer>
  Powered by <a href="https://www.discogs.com" target="_blank" rel="noopener">Discogs</a>
  &amp; <a href="https://www.anthropic.com" target="_blank" rel="noopener">Claude</a>
</footer>

<div id="modal-overlay">
  <div id="modal-box">
    <button id="modal-close" onclick="closeModal()">×</button>
    <div id="modal-loading">Loading…</div>
    <div id="album-info"></div>
  </div>
</div>

<div id="bio-full-overlay">
  <div id="bio-full-box">
    <button id="bio-full-close" onclick="closeBioFull()">×</button>
    <div id="bio-full-name"></div>
    <div id="bio-full-text"></div>
  </div>
</div>

<div id="shows-overlay">
  <div id="shows-box">
    <button id="shows-close" onclick="closeShows()">×</button>
    <div id="shows-title"></div>
    <div id="shows-list"></div>
  </div>
</div>

<div id="video-overlay">
  <div id="video-box">
    <button id="video-close" onclick="closeVideo()">×</button>
    <iframe id="video-iframe" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>
</div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  const API = "https://discogs-mcp-server-production-c794.up.railway.app";

  // ── State ─────────────────────────────────────────────────────────────────
  let currentPage = 1;
  let totalPages  = 1;
  const itemCache = new Map(); // id → search result item

  // ── Search ────────────────────────────────────────────────────────────────
  // ── URL state helpers ────────────────────────────────────────────────────
  function pushSearchState(q, type, artistRaw, release, year, label, genre, page) {
    const p = new URLSearchParams();
    if (q)        p.set("q",       q);
    if (type)     p.set("type",    type);
    if (artistRaw) p.set("artist", artistRaw);
    if (release)  p.set("release", release);
    if (year)     p.set("year",    year);
    if (label)    p.set("label",   label);
    if (genre)    p.set("genre",   genre);
    if (page > 1) p.set("page",    String(page));
    history.pushState({}, "", p.toString() ? "?" + p.toString() : location.pathname);
  }

  function restoreFromParams(p) {
    document.getElementById("query").value     = p.get("q")       ?? "";
    document.getElementById("type").value      = p.get("type")    ?? "";
    document.getElementById("f-artist").value  = p.get("artist")  ?? "";
    document.getElementById("f-release").value = p.get("release") ?? "";
    document.getElementById("f-year").value    = p.get("year")    ?? "";
    document.getElementById("f-label").value   = p.get("label")   ?? "";
    document.getElementById("f-genre").value   = p.get("genre")   ?? "";
  }

  async function doSearch(page = 1, skipPushState = false) {
    const q       = document.getElementById("query").value.trim();
    const type    = document.getElementById("type").value;
    const artistRaw = document.getElementById("f-artist").value.trim();
    const artist    = artistRaw.replace(/\s*\(\d+\)$/, ""); // stripped for search params
    const release = document.getElementById("f-release").value.trim();
    const year    = document.getElementById("f-year").value.trim();
    const label   = document.getElementById("f-label").value.trim();
    const genre   = document.getElementById("f-genre").value.trim();

    if (!q && !artist && !release && !year && !label && !genre) {
      setStatus("Enter a search term or fill in at least one filter.", false);
      return;
    }

    if (!skipPushState) pushSearchState(q, type, artistRaw, release, year, label, genre, page);

    currentPage = page;
    document.getElementById("search-btn").disabled = true;
    document.getElementById("pagination").style.display = "none";
    document.getElementById("blurb").style.display = "none";
    document.getElementById("artist-alts").innerHTML = "";
    setStatus("Searching…");
    document.getElementById("results").innerHTML = "";

    if (page === 1) {
      const parts = [];
      if (q)       parts.push(q);
      if (artist)  parts.push(`Artist: ${artist}`);
      if (release) parts.push(`Release: ${release}`);
      if (year)    parts.push(`Year: ${year}`);
      if (label)   parts.push(`Label: ${label}`);
      if (genre)   parts.push(`Genre: ${genre}`);
      const typeLabel = document.getElementById("type").options[document.getElementById("type").selectedIndex].text;
      if (type)    parts.push(`Type: ${typeLabel}`);
      document.getElementById("search-desc").textContent = parts.length ? "Search :: " + parts.join(", ") : "";
    }

    const params = new URLSearchParams({ q, page, per_page: 12 });

    if (type) params.set("type", type);
    if (artist)  params.set("artist",        artist);
    if (release) params.set("release_title", release);
    if (year)    params.set("year",          year);
    if (label)   params.set("label",         label);
    if (genre)   params.set("genre",         genre);


    try {
      let bioFetch   = null;
      let showsFetch = null;
      if (page === 1) {
        if (artistRaw) {
          bioFetch   = fetch(`${API}/artist-bio?name=${encodeURIComponent(artistRaw)}`);
          showsFetch = fetch(`${API}/upcoming-shows?artist=${encodeURIComponent(artist)}`);
        } else if (label) {
          bioFetch = fetch(`${API}/label-bio?name=${encodeURIComponent(label)}`);
        } else if (genre) {
          bioFetch = fetch(`${API}/genre-info?genre=${encodeURIComponent(genre)}`);
        }
      }
      const [res, bioRes, showsRes] = await Promise.all([
        fetch(`${API}/search?${params}`),
        bioFetch   ?? Promise.resolve(null),
        showsFetch ?? Promise.resolve(null),
      ]);

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const items = data.results ?? [];
      totalPages  = data.pagination?.pages ?? 1;

      // Artist bio + shows: from filter (fetched in parallel) or derived from first result
      const blurbEl = document.getElementById("blurb");
      if (page === 1) {
        let bioData   = null;
        let showsData = null;
        if (bioRes) {
          bioData = await bioRes.json().catch(() => null);
        }
        if (showsRes) {
          showsData = await showsRes.json().catch(() => null);
        }
        if (!bioData && !artist && !label && !genre && items.length > 0) {
          const first = items[0];
          if ((first.type === "release" || first.type === "master") && first.title?.includes(" - ")) {
            const derivedArtist = first.title.slice(0, first.title.indexOf(" - "));
            [bioData, showsData] = await Promise.all([
              fetch(`${API}/artist-bio?name=${encodeURIComponent(derivedArtist)}`).then(r => r.json()).catch(() => null),
              fetch(`${API}/upcoming-shows?artist=${encodeURIComponent(derivedArtist)}`).then(r => r.json()).catch(() => null),
            ]);
          }
        }
        // Render alternatives above bio box
        const altsEl = document.getElementById("artist-alts");
        const alts = (bioData?.alternatives ?? []).filter(a => a.name);
        if (alts.length > 0) {
          altsEl.innerHTML = `<div style="font-size:0.78rem;color:#555;margin-bottom:0.6rem">Also: ${
            alts.map(a => `<a href="#" data-alt-name="${escHtml(a.name)}" onclick="selectAltArtist(event,this)" style="color:#666;text-decoration:none;border-bottom:1px dotted #444">${escHtml(a.name)}</a>`).join(' &middot; ')
          }</div>`;
        } else {
          altsEl.innerHTML = "";
        }

        if (bioData?.profile) {
          const shows = showsData?.shows ?? [];
          window._upcomingShows = { name: bioData.name, shows };
          const fullText = stripDiscogsMarkup(bioData.profile);
          const entityType = artist ? 'artist' : label ? 'label' : genre ? 'genre' : 'artist';
          // Store raw profile so the full-bio popup can render [a=Name] as links
          window._currentBio = { name: bioData.name, text: bioData.profile, wiki: bioData.wikiExtract ?? null };

          const TRUNCATE = 300;
          const needsMore = fullText.length > TRUNCATE;
          // Truncate on raw text so links are never cut; append ellipsis if needed
          const truncatedRaw = needsMore ? truncateRaw(bioData.profile, TRUNCATE) + '\u2026' : bioData.profile;

          const showsLink = shows.length > 0
            ? ` <a href="#" onclick="openShowsPopup(event)" style="font-size:0.75rem;color:var(--accent);font-weight:400;margin-left:0.4rem;text-decoration:none">(upcoming shows)</a>`
            : "";
          const readMore = needsMore
            ? ` <a href="#" onclick="openBioFull(event)" style="font-size:0.8rem;color:var(--accent);white-space:nowrap;text-decoration:none">read more</a>`
            : "";
          const heading = bioData.name
            ? `<strong style="display:block;margin-bottom:0.4rem;color:var(--accent)">${escHtml(bioData.name)}${showsLink}</strong>`
            : "";

          let discogsHref = "";
          if (entityType === 'artist') discogsHref = `https://www.discogs.com/search/?q=${encodeURIComponent(bioData.name)}&type=artist`;
          else if (entityType === 'label') discogsHref = `https://www.discogs.com/search/?q=${encodeURIComponent(bioData.name)}&type=label`;
          const discogsLink = discogsHref
            ? `<div style="margin-top:0.3rem"><a href="${discogsHref}" target="_blank" rel="noopener" style="font-size:0.75rem;color:#666;text-decoration:none">View on Discogs ↗</a></div>`
            : "";

          blurbEl.innerHTML = heading + renderBioMarkup(truncatedRaw) + readMore + discogsLink;
          blurbEl.style.display = "block";
        }
      }

      if (!items.length) { setStatus("No results found."); return; }

      setStatus(`${data.pagination?.items ?? items.length} results — page ${currentPage} of ${totalPages}`);
      renderResults(items);
      renderPagination();
    } catch (e) {
      setStatus("Search failed: " + e.message, true);
    } finally {
      document.getElementById("search-btn").disabled = false;
    }
  }

  // ── Render cards ──────────────────────────────────────────────────────────
  function renderResults(items) {
    const grid = document.getElementById("results");
    grid.innerHTML = items.map(item => {
      const url  = item.uri ? `https://www.discogs.com${item.uri}` : "#";
      const type = item.type ?? "";

      // Split "Artist – Title" for release/master results
      let artist = "";
      let title  = item.title ?? "Unknown";
      if ((type === "release" || type === "master") && title.includes(" - ")) {
        const idx = title.indexOf(" - ");
        artist = title.slice(0, idx);
        title  = title.slice(idx + 3);
      }

      const label   = (item.label   ?? []).slice(0, 2).join(", ");
      const formats = (item.format  ?? []).slice(0, 3).join(" · ");
      const genre   = (item.genre   ?? []).slice(0, 1).join("");
      const country = item.country ?? "";
      const year    = item.year    ?? "";

      const metaParts = [type, [year, country].filter(Boolean).join(" · ")].filter(Boolean);

      const thumb = item.cover_image
        ? `<img src="${item.cover_image}" alt="${escHtml(title)}" loading="lazy" />`
        : `<div class="thumb-placeholder">♪</div>`;

      const isRelease = type === "release" || type === "master";
      const isArtist  = type === "artist";
      const isLabel   = type === "label";
      if (isRelease) itemCache.set(String(item.id), item);
      const cardAttrs = isRelease
        ? `class="card" href="#" onclick="openModal(event,'${item.id}','${type}','${url.replace(/'/g, "\\'")}')" `
        : (isArtist || isLabel)
          ? `class="card" href="#" data-entity-type="${escHtml(type)}" data-entity-name="${escHtml(title)}" onclick="searchByEntity(event,this)"`
          : `class="card" href="${url}" target="_blank" rel="noopener"`;

      return `
        <a ${cardAttrs}>
          ${thumb}
          <div class="card-body">
            ${artist ? `<div class="card-artist">${escHtml(artist)}</div>` : ""}
            <div class="card-title">${escHtml(title)}</div>
            ${label   ? `<div class="card-sub">${escHtml(label)}</div>`   : ""}
            ${formats ? `<div class="card-format">${escHtml(formats)}</div>` : ""}
            ${genre   ? `<div class="card-format">${escHtml(genre)}</div>`   : ""}
            <div class="card-meta">${metaParts.map(escHtml).join(" · ")}</div>
          </div>
        </a>`;
    }).join("");
  }

  // ── Pagination ────────────────────────────────────────────────────────────
  function renderPagination() {
    if (totalPages <= 1) return;
    document.getElementById("pagination").style.display = "flex";
    document.getElementById("page-info").textContent = `${currentPage} / ${totalPages}`;
    document.getElementById("prev-btn").disabled = currentPage <= 1;
    document.getElementById("next-btn").disabled = currentPage >= totalPages;
  }

  // ── Modal ─────────────────────────────────────────────────────────────────
  function openModal(event, id, type, discogsUrl) {
    event.preventDefault();
    const overlay = document.getElementById("modal-overlay");
    document.getElementById("album-info").innerHTML = "";
    document.getElementById("modal-loading").style.display = "block";
    overlay.classList.add("open");

    const cachedItem = itemCache.get(String(id)) ?? { type };
    const endpoint = type === "master" ? "master" : "release";
    Promise.all([
      fetch(`${API}/${endpoint}/${id}`).then(r => r.json()),
      fetch(`${API}/marketplace-stats/${id}?type=${type}`).then(r => r.json()).catch(() => null),
    ])
      .then(([d, stats]) => {
        document.getElementById("modal-loading").style.display = "none";
        renderAlbumInfo(d, cachedItem, discogsUrl, stats);
      })
      .catch(() => {
        document.getElementById("modal-loading").textContent = "Failed to load.";
      });
  }

  function closeModal() {
    document.getElementById("modal-overlay").classList.remove("open");
  }

  document.getElementById("modal-overlay").addEventListener("click", e => {
    if (e.target === document.getElementById("modal-overlay")) closeModal();
  });

  // ── Bio full popup ────────────────────────────────────────────────────────
  function openBioFull(event) {
    event.preventDefault();
    const { name, text, wiki } = window._currentBio ?? {};
    document.getElementById("bio-full-name").textContent = name ?? "";
    let html = renderBioMarkup(text ?? "");
    if (wiki) {
      html += `<hr style="border:none;border-top:1px solid var(--border);margin:1.25rem 0 1rem">
               <div style="font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.6rem">Wikipedia</div>
               <div style="font-size:0.87rem;line-height:1.65">${escHtml(wiki)}</div>`;
    }
    document.getElementById("bio-full-text").innerHTML = html;
    document.getElementById("bio-full-overlay").classList.add("open");
  }

  function closeBioFull() {
    document.getElementById("bio-full-overlay").classList.remove("open");
  }

  document.getElementById("bio-full-overlay").addEventListener("click", e => {
    if (e.target === document.getElementById("bio-full-overlay")) closeBioFull();
  });

  // ── Shows popup ───────────────────────────────────────────────────────────
  function openShowsPopup(event) {
    event.preventDefault();
    const { name, shows } = window._upcomingShows ?? { name: "", shows: [] };
    document.getElementById("shows-title").textContent = `Upcoming Shows — ${name}`;
    document.getElementById("shows-list").innerHTML = shows.length === 0
      ? `<p style="color:var(--muted);padding:0.5rem 0">No upcoming shows found on Ticketmaster.</p>`
      : shows.map(s => `
        <div class="show-row">
          <div class="show-date">${escHtml(s.date)}${s.time ? "<br>" + escHtml(s.time.slice(0,5)) : ""}</div>
          <div class="show-info">
            <div class="show-venue">${escHtml(s.venue)}</div>
            <div class="show-location">${[s.city, s.country].filter(Boolean).map(escHtml).join(", ")}</div>
          </div>
          ${s.url ? `<a href="${s.url}" target="_blank" rel="noopener" class="show-ticket">Tickets ↗</a>` : ""}
        </div>`).join("");
    document.getElementById("shows-overlay").classList.add("open");
  }

  function closeShows() {
    document.getElementById("shows-overlay").classList.remove("open");
  }

  document.getElementById("shows-overlay").addEventListener("click", e => {
    if (e.target === document.getElementById("shows-overlay")) closeShows();
  });

  // ── Video popup ────────────────────────────────────────────────────────────
  function openVideo(event, url) {
    event.preventDefault();
    event.stopPropagation();
    const id = extractYouTubeId(url);
    if (!id) { window.open(url, "_blank", "noopener"); return; }
    document.getElementById("video-iframe").src = `https://www.youtube.com/embed/${id}?autoplay=1`;
    document.getElementById("video-overlay").classList.add("open");
  }

  function closeVideo() {
    document.getElementById("video-overlay").classList.remove("open");
    document.getElementById("video-iframe").src = "";
  }

  function extractYouTubeId(url) {
    try {
      const u = new URL(url);
      if (u.hostname === "youtu.be") return u.pathname.slice(1);
      return u.searchParams.get("v");
    } catch { return null; }
  }

  document.getElementById("video-overlay").addEventListener("click", e => {
    if (e.target === document.getElementById("video-overlay")) closeVideo();
  });

  document.addEventListener("keydown", e => {
    if (e.key === "Escape") {
      closeVideo();
      closeModal();
      closeShows();
      closeBioFull();
    }
  });

  // ── Album info panel ──────────────────────────────────────────────────────
  function renderAlbumInfo(d, searchResult, discogsUrl = "", stats = null) {
    const el = document.getElementById("album-info");

    const title    = d.title ?? searchResult.title ?? "";
    const artists  = (d.artists ?? []).map(a => a.name).join(", ")
                     || (searchResult.title ?? "").split(" - ")[0] || "";
    const year     = d.year ?? searchResult.year ?? "";
    const labels   = (d.labels ?? []).map(l => l.name).slice(0, 2).join(", ")
                     || (searchResult.label ?? []).slice(0, 2).join(", ");
    const genres   = [...(d.genres ?? []), ...(d.styles ?? [])].slice(0, 4).join(" · ");
    const country  = d.country ?? searchResult.country ?? "";
    const img      = d.images?.[0]?.uri ?? searchResult.cover_image ?? "";
    const released    = d.released ?? "";
    const formats     = (d.formats ?? []).map(f =>
      [f.name, ...(f.descriptions ?? [])].filter(Boolean).join(" · ")
    ).join("; ") || (searchResult.format ?? []).join(" · ");
    const credits     = (d.extraartists ?? [])
      .map(a => `${escHtml(a.name)}${a.role ? ` <span class="credit-role">(${escHtml(a.role)})</span>` : ""}`)
      .join(" · ");
    const notes       = d.notes ? stripDiscogsMarkup(d.notes) : "";
    const typeLabel   = searchResult.type === "master" ? "Master Release" : searchResult.type === "release" ? "Release" : "";

    // Build video title → URL map for matching to tracks
    const videoMap = new Map();
    for (const v of (d.videos ?? [])) {
      if (v.title && v.uri) videoMap.set(v.title.toLowerCase(), v.uri);
    }
    function findVideo(trackTitle) {
      const tl = trackTitle.toLowerCase();
      for (const [vt, uri] of videoMap) {
        if (vt.includes(tl) || tl.includes(vt)) return uri;
      }
      return null;
    }

    const detailRows = [
      labels  ? `<span class="detail-label">Label</span><span>${escHtml(labels)}</span>`   : "",
      formats ? `<span class="detail-label">Format</span><span>${escHtml(formats)}</span>` : "",
      country ? `<span class="detail-label">Country</span><span>${escHtml(country)}</span>` : "",
      genres  ? `<span class="detail-label">Genre</span><span>${escHtml(genres)}</span>`   : "",
      year    ? `<span class="detail-label">Year</span><span>${escHtml(String(year))}</span>` : "",
    ].filter(Boolean).join("");

    const tracks = (d.tracklist ?? []).filter(t => t.type_ !== "heading");
    const trackHTML = tracks.length ? `
      <div class="album-tracklist">
        <div class="tracklist-heading">Tracklist</div>
        ${tracks.map(t => {
          const url = findVideo(t.title || "");
          const titleEl = url
            ? `<a class="track-link" href="#" onclick="openVideo(event,'${url.replace(/'/g, "\\'")}')">${escHtml(t.title || "")} ▶</a>`
            : escHtml(t.title || "");
          return `<div class="track">
            <span class="track-pos">${escHtml(t.position || "")}</span>
            <span class="track-title">${titleEl}</span>
            ${t.duration ? `<span class="track-dur">${escHtml(t.duration)}</span>` : ""}
          </div>`;
        }).join("")}
      </div>` : "";

    const metaRows = [
      released ? `<div class="album-meta-row"><span class="meta-label">Released</span><span>${escHtml(released)}</span></div>` : "",
      formats  ? `<div class="album-meta-row"><span class="meta-label">Format</span><span>${escHtml(formats)}</span></div>` : "",
      credits  ? `<div class="album-meta-row"><span class="meta-label">Credits</span><span>${credits}</span></div>` : "",
      notes    ? `<div class="album-notes"><div class="tracklist-heading" style="margin-top:0.5rem">Notes</div>${escHtml(notes)}</div>` : "",
    ].filter(Boolean).join("");

    el.innerHTML = `
      <div class="album-header">
        ${img ? `<img class="album-cover" src="${img}" alt="${escHtml(title)}" loading="lazy" />`
               : `<div class="album-cover-placeholder">♪</div>`}
        <div class="album-meta">
          ${typeLabel ? `<div class="album-type-badge">${escHtml(typeLabel)}</div>` : ""}
          <h2>${escHtml(title)}</h2>
          ${artists ? `<div class="album-artist">${escHtml(artists)}</div>` : ""}
          ${detailRows ? `<div class="album-detail-grid">${detailRows}</div>` : ""}
          ${discogsUrl ? `<a href="${discogsUrl}" target="_blank" rel="noopener" style="font-size:0.75rem;color:var(--accent);text-decoration:none;margin-top:0.5rem;display:inline-block">View on Discogs ↗</a>` : ""}
          ${stats?.numForSale > 0 && stats?.lowestPrice != null
            ? `<a href="https://www.discogs.com/sell/list?release_id=${escHtml(String(stats.releaseId))}" target="_blank" rel="noopener" style="font-size:0.75rem;color:#888;text-decoration:none;margin-top:0.2rem;display:block">${escHtml(String(stats.numForSale))} available from $${parseFloat(stats.lowestPrice).toFixed(2)}</a>`
            : (stats?.numForSale === 0 ? `<div style="font-size:0.75rem;color:#555;margin-top:0.2rem">Not currently available on Discogs marketplace</div>` : "")
          }
        </div>
      </div>
      ${trackHTML}
      ${metaRows ? `<div class="album-extra">${metaRows}</div>` : ""}`;
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function setStatus(msg, isError = false) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = isError ? "error" : "";
  }

  // Converts raw Discogs profile text to HTML, making [a=Name] tags into clickable links
  function renderBioMarkup(text) {
    if (!text) return '';
    const parts = [];
    let lastIndex = 0;
    const re = /\[a=([^\]]+)\]/g;
    let match;
    while ((match = re.exec(text)) !== null) {
      if (match.index > lastIndex) {
        parts.push(escHtml(text.slice(lastIndex, match.index)));
      }
      const name = match[1];
      parts.push(`<a href="#" class="bio-artist-link" onclick="searchBioArtist(event,this)" data-artist="${escHtml(name)}">${escHtml(name)}</a>`);
      lastIndex = match.index + match[0].length;
    }
    if (lastIndex < text.length) parts.push(escHtml(text.slice(lastIndex)));
    let html = parts.join('');
    // Strip remaining BBCode tags
    html = html.replace(/\[[^\]]+\]/g, '');
    // Convert newlines to line breaks
    html = html.replace(/\n/g, '<br>');
    return html;
  }

  function searchBioArtist(event, el) {
    event.preventDefault();
    closeBioFull();
    document.getElementById("f-artist").value  = el.dataset.artist;
    document.getElementById("query").value     = "";
    document.getElementById("f-release").value = "";
    document.getElementById("f-year").value    = "";
    document.getElementById("f-label").value   = "";
    document.getElementById("f-genre").value   = "";
    document.getElementById("type").value      = "";
    doSearch(1);
  }

  // Truncate raw Discogs profile text so its plain-text equivalent is <= plainLimit chars,
  // returning at the last word boundary. Never cuts inside a BBCode tag.
  function truncateRaw(rawText, plainLimit) {
    let plainCount = 0;
    let i = 0;
    let lastSpace = -1;
    while (i < rawText.length) {
      if (rawText[i] === '[') {
        const end = rawText.indexOf(']', i);
        if (end !== -1) {
          const tag = rawText.slice(i, end + 1);
          const nameMatch = tag.match(/^\[a=([^\]]+)\]$/);
          if (nameMatch) plainCount += nameMatch[1].length;
          // other BBCode tags count as 0 display chars
          i = end + 1;
          continue;
        }
      }
      if (rawText[i] === ' ' && plainCount <= plainLimit) lastSpace = i;
      if (plainCount >= plainLimit) {
        return lastSpace > 0 ? rawText.slice(0, lastSpace) : rawText.slice(0, i);
      }
      plainCount++;
      i++;
    }
    return rawText;
  }

  function stripDiscogsMarkup(text) {
    return text
      .replace(/\[a=([^\]]+)\]/g, '$1')                   // [a=Name] → Name
      .replace(/\[l=([^\]]+)\]/g, '$1')                   // [l=Label] → Label
      .replace(/\[url=[^\]]*\]([^\[]*)\[\/url\]/g, '$1')  // [url=...]text[/url] → text
      .replace(/\[[a-z]\]([^\[]*)\[\/[a-z]\]/g, '$1')     // [i]...[/i] etc → text
      .replace(/\[[^\]]+\]/g, '')                          // remove ID-only tags [r=123], [m=123], [a123]
      .replace(/\s+([.,])/g, '$1')                         // fix "word ." → "word."
      .replace(/\s{2,}/g, ' ')                             // collapse multiple spaces
      .trim();
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // ── Alt artist link → new search ─────────────────────────────────────────
  function selectAltArtist(event, el) {
    event.preventDefault();
    document.getElementById("f-artist").value = el.dataset.altName;
    document.getElementById("query").value = "";
    doSearch(1);
  }

  // ── Entity card click → new search ───────────────────────────────────────
  function searchByEntity(event, el) {
    event.preventDefault();
    const type = el.dataset.entityType;
    const name = el.dataset.entityName;
    document.getElementById("query").value = "";
    document.getElementById("type").value  = "";
    document.getElementById("f-artist").value  = "";
    document.getElementById("f-release").value = "";
    document.getElementById("f-year").value    = "";
    document.getElementById("f-label").value   = "";
    document.getElementById("f-genre").value   = "";
    if (type === "artist") document.getElementById("f-artist").value = name;
    if (type === "label")  document.getElementById("f-label").value  = name;
    doSearch(1);
  }

  // ── Browser back / forward ───────────────────────────────────────────────
  window.addEventListener("popstate", () => {
    const p = new URLSearchParams(location.search);
    restoreFromParams(p);
    if (p.toString()) {
      doSearch(parseInt(p.get("page") ?? "1"), true);
    } else {
      // Back to blank state — clear everything
      document.getElementById("results").innerHTML = "";
      document.getElementById("blurb").style.display = "none";
      document.getElementById("artist-alts").innerHTML = "";
      document.getElementById("status").textContent = "";
      document.getElementById("pagination").style.display = "none";
      document.getElementById("search-desc").textContent = "";
    }
  });

  // ── Restore from URL on page load ────────────────────────────────────────
  (function () {
    const p = new URLSearchParams(location.search);
    if (p.toString()) {
      restoreFromParams(p);
      doSearch(parseInt(p.get("page") ?? "1"), true);
    }
  })();

  // Submit on Enter (all text inputs)
  ["query", "f-artist", "f-release", "f-year", "f-label"].forEach(id => {
    document.getElementById(id).addEventListener("keydown", e => {
      if (e.key === "Enter") doSearch(1);
    });
  });
</script>
</body>
</html>
