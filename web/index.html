<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discogs Search — sideman.pro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f0f;
      --surface:   #1a1a1a;
      --border:    #2e2e2e;
      --accent:    #e8a020;
      --accent-dim:#a06c10;
      --text:      #e2e2e2;
      --muted:     #888;
      --radius:    8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    header {
      padding: 2rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    header .inner {
      max-width: 900px;
      margin: 0 auto;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* ── Search form ── */
    .search-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
      padding: 0.65rem 1rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.9rem;
      padding: 0.65rem 0.75rem;
      outline: none;
      cursor: pointer;
    }

    button {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #000;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.65rem 1.4rem;
      transition: background 0.15s;
    }

    button:hover { background: #ffb833; }
    button:disabled { background: var(--accent-dim); cursor: not-allowed; }

    .filters {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .filters input[type="text"] {
      flex: 1;
      min-width: 120px;
      font-size: 0.85rem;
      padding: 0.45rem 0.75rem;
    }

    .filters label {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      flex: 1;
      min-width: 100px;
    }

    /* ── Status / error ── */
    #blurb {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 0.9rem 1.1rem;
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 1.25rem;
      display: none;
    }

    /* ── Modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    #modal-overlay.open { display: flex; }

    #modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-width: 620px;
      width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      position: relative;
    }

    #modal-close {
      position: sticky;
      top: 0.5rem;
      float: right;
      margin: 0.5rem 0.6rem 0 0;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      z-index: 1;
    }

    #modal-close:hover { color: var(--text); background: #333; }

    #modal-loading {
      padding: 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    #album-info { overflow: hidden; }

    #album-info .album-header {
      display: flex;
      gap: 1rem;
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }

    #album-info .album-cover {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
      background: #222;
    }

    #album-info .album-cover-placeholder {
      width: 90px;
      height: 90px;
      background: #222;
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--border);
      font-size: 2rem;
    }

    #album-info .album-cover {
      width: 130px;
      height: 130px;
    }

    #album-info .album-cover-placeholder {
      width: 130px;
      height: 130px;
    }

    #album-info .album-type-badge {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.1rem 0.4rem;
      display: inline-block;
      margin-bottom: 0.35rem;
    }

    #album-info .album-meta h2 {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 0.2rem;
      line-height: 1.3;
    }

    #album-info .album-meta .album-artist {
      color: var(--accent);
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }

    #album-info .album-detail-grid {
      display: grid;
      grid-template-columns: 4.5rem 1fr;
      gap: 0.15rem 0.5rem;
      font-size: 0.78rem;
    }

    #album-info .detail-label {
      color: var(--muted);
    }

    #album-info .album-tracklist {
      padding: 0.75rem 1rem;
    }

    #album-info .tracklist-heading {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    #album-info .track {
      display: flex;
      gap: 0.6rem;
      font-size: 0.82rem;
      padding: 0.2rem 0;
      border-bottom: 1px solid #222;
    }

    #album-info .track:last-child { border-bottom: none; }

    #album-info .track-pos {
      color: var(--muted);
      min-width: 2rem;
      text-align: right;
      flex-shrink: 0;
    }

    #album-info .track-title { flex: 1; }

    #album-info .track-dur {
      color: var(--muted);
      flex-shrink: 0;
    }

    #album-info .track-link {
      color: inherit;
      text-decoration: none;
    }

    #album-info .track-link:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    #album-info .album-extra {
      border-top: 1px solid var(--border);
      padding: 0.75rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    #album-info .album-meta-row {
      display: flex;
      gap: 0.75rem;
      font-size: 0.8rem;
    }

    #album-info .meta-label {
      color: var(--muted);
      min-width: 5rem;
      flex-shrink: 0;
    }

    #album-info .credit-role {
      color: var(--muted);
    }

    #album-info .album-notes {
      margin-top: 0.25rem;
      font-size: 0.8rem;
      line-height: 1.55;
      color: var(--muted);
    }

    #status {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
      min-height: 1.2em;
    }

    #status.error { color: #e05555; }

    /* ── Results grid ── */
    #results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.15s, transform 0.15s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: #222;
    }

    .card .thumb-placeholder {
      width: 100%;
      aspect-ratio: 1;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--border);
      font-size: 2.5rem;
    }

    .card-body {
      padding: 0.75rem 0.85rem 0.9rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .card-artist {
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 500;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-title {
      font-size: 0.875rem;
      font-weight: 600;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-sub {
      font-size: 0.75rem;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-format {
      font-size: 0.72rem;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      margin-top: auto;
      padding-top: 0.5rem;
      font-size: 0.7rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ── Pagination ── */
    #pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      margin-top: 2rem;
    }

    #pagination button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-weight: 500;
      padding: 0.5rem 1.2rem;
    }

    #pagination button:hover:not(:disabled) {
      border-color: var(--accent);
      background: var(--surface);
      color: var(--accent);
    }

    #page-info {
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

<header>
  <div class="inner">
    <h1>Discogs Search</h1>
  </div>
</header>

<main>
  <div class="search-row">
    <input type="text" id="query" placeholder="Search artists, releases, labels…" autocomplete="off" />
    <select id="type">
      <option value="">All types</option>
      <option value="release">Release</option>
      <option value="master">Master</option>
      <option value="artist">Artist</option>
      <option value="label">Label</option>
    </select>
    <button id="search-btn" onclick="doSearch(1)">Search</button>
  </div>

  <div class="filters">
    <label>Artist <input type="text" id="f-artist" placeholder="e.g. Miles Davis" /></label>
    <label>Release <input type="text" id="f-release" placeholder="e.g. Kind of Blue" /></label>
    <label>Year <input type="text" id="f-year" placeholder="e.g. 1973" /></label>
    <label>Label <input type="text" id="f-label" placeholder="e.g. Blue Note" /></label>
    <label>Genre <input type="text" id="f-genre" placeholder="e.g. Jazz" /></label>
  </div>

  <div id="blurb"></div>
  <div id="status"></div>
  <div id="results"></div>
  <div id="pagination" style="display:none">
    <button id="prev-btn" onclick="doSearch(currentPage - 1)">← Prev</button>
    <span id="page-info"></span>
    <button id="next-btn" onclick="doSearch(currentPage + 1)">Next →</button>
  </div>
</main>

<div id="modal-overlay">
  <div id="modal-box">
    <button id="modal-close" onclick="closeModal()">×</button>
    <div id="modal-loading">Loading…</div>
    <div id="album-info"></div>
  </div>
</div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  const API = "https://discogs-mcp-server-production-c794.up.railway.app";

  // ── State ─────────────────────────────────────────────────────────────────
  let currentPage = 1;
  let totalPages  = 1;
  const itemCache = new Map(); // id → search result item

  // ── Search ────────────────────────────────────────────────────────────────
  async function doSearch(page = 1) {
    const q       = document.getElementById("query").value.trim();
    const type    = document.getElementById("type").value;
    const artist  = document.getElementById("f-artist").value.trim();
    const release = document.getElementById("f-release").value.trim();
    const year    = document.getElementById("f-year").value.trim();
    const label   = document.getElementById("f-label").value.trim();
    const genre   = document.getElementById("f-genre").value.trim();

    if (!q && !artist && !release && !year && !label && !genre) {
      setStatus("Enter a search term or fill in at least one filter.", false);
      return;
    }

    currentPage = page;
    document.getElementById("search-btn").disabled = true;
    document.getElementById("pagination").style.display = "none";
    document.getElementById("blurb").style.display = "none";
    setStatus("Searching…");
    document.getElementById("results").innerHTML = "";

    const params = new URLSearchParams({ q, page, per_page: 12 });

    const effectiveType = type || (artist ? "master" : "");
    if (effectiveType) params.set("type",   effectiveType);
    if (artist)  params.set("artist",        artist);
    if (release) params.set("release_title", release);
    if (year)    params.set("year",          year);
    if (label)   params.set("label",         label);
    if (genre)   params.set("genre",         genre);

    try {
      const [res, bioRes] = await Promise.all([
        fetch(`${API}/search?${params}`),
        (page === 1 && artist) ? fetch(`${API}/artist-bio?name=${encodeURIComponent(artist)}`) : Promise.resolve(null),
      ]);

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const items = data.results ?? [];
      totalPages  = data.pagination?.pages ?? 1;

      // Artist bio: from filter field (already fetched in parallel), or extracted from first result
      const blurbEl = document.getElementById("blurb");
      if (page === 1) {
        let bioData = null;
        if (bioRes) {
          bioData = await bioRes.json().catch(() => null);
        } else if (items.length > 0) {
          const first = items[0];
          if ((first.type === "release" || first.type === "master") && first.title?.includes(" - ")) {
            const derivedArtist = first.title.slice(0, first.title.indexOf(" - "));
            bioData = await fetch(`${API}/artist-bio?name=${encodeURIComponent(derivedArtist)}`).then(r => r.json()).catch(() => null);
          }
        }
        if (bioData?.profile) {
          blurbEl.innerHTML = (bioData.name ? `<strong style="display:block;margin-bottom:0.4rem;color:var(--accent)">${escHtml(bioData.name)}</strong>` : "")
            + escHtml(stripDiscogsMarkup(bioData.profile));
          blurbEl.style.display = "block";
        }
      }

      if (!items.length) { setStatus("No results found."); return; }

      setStatus(`${data.pagination?.items ?? items.length} results — page ${currentPage} of ${totalPages}`);
      renderResults(items);
      renderPagination();
    } catch (e) {
      setStatus("Search failed: " + e.message, true);
    } finally {
      document.getElementById("search-btn").disabled = false;
    }
  }

  // ── Render cards ──────────────────────────────────────────────────────────
  function renderResults(items) {
    const grid = document.getElementById("results");
    grid.innerHTML = items.map(item => {
      const url  = item.uri ? `https://www.discogs.com${item.uri}` : "#";
      const type = item.type ?? "";

      // Split "Artist – Title" for release/master results
      let artist = "";
      let title  = item.title ?? "Unknown";
      if ((type === "release" || type === "master") && title.includes(" - ")) {
        const idx = title.indexOf(" - ");
        artist = title.slice(0, idx);
        title  = title.slice(idx + 3);
      }

      const label   = (item.label   ?? []).slice(0, 2).join(", ");
      const formats = (item.format  ?? []).slice(0, 3).join(" · ");
      const genre   = (item.genre   ?? []).slice(0, 1).join("");
      const country = item.country ?? "";
      const year    = item.year    ?? "";

      const metaParts = [type, [year, country].filter(Boolean).join(" · ")].filter(Boolean);

      const thumb = item.cover_image
        ? `<img src="${item.cover_image}" alt="${escHtml(title)}" loading="lazy" />`
        : `<div class="thumb-placeholder">♪</div>`;

      const isRelease = type === "release" || type === "master";
      if (isRelease) itemCache.set(String(item.id), item);
      const cardAttrs = isRelease
        ? `class="card" href="#" onclick="openModal(event,'${item.id}','${type}','${url.replace(/'/g, "\\'")}')" `
        : `class="card" href="${url}" target="_blank" rel="noopener"`;

      return `
        <a ${cardAttrs}>
          ${thumb}
          <div class="card-body">
            ${artist ? `<div class="card-artist">${escHtml(artist)}</div>` : ""}
            <div class="card-title">${escHtml(title)}</div>
            ${label   ? `<div class="card-sub">${escHtml(label)}</div>`   : ""}
            ${formats ? `<div class="card-format">${escHtml(formats)}</div>` : ""}
            ${genre   ? `<div class="card-format">${escHtml(genre)}</div>`   : ""}
            <div class="card-meta">${metaParts.map(escHtml).join(" · ")}</div>
          </div>
        </a>`;
    }).join("");
  }

  // ── Pagination ────────────────────────────────────────────────────────────
  function renderPagination() {
    if (totalPages <= 1) return;
    document.getElementById("pagination").style.display = "flex";
    document.getElementById("page-info").textContent = `${currentPage} / ${totalPages}`;
    document.getElementById("prev-btn").disabled = currentPage <= 1;
    document.getElementById("next-btn").disabled = currentPage >= totalPages;
  }

  // ── Modal ─────────────────────────────────────────────────────────────────
  function openModal(event, id, type, discogsUrl) {
    event.preventDefault();
    const overlay = document.getElementById("modal-overlay");
    document.getElementById("album-info").innerHTML = "";
    document.getElementById("modal-loading").style.display = "block";
    overlay.classList.add("open");

    const cachedItem = itemCache.get(String(id)) ?? { type };
    const endpoint = type === "master" ? "master" : "release";
    fetch(`${API}/${endpoint}/${id}`)
      .then(r => r.json())
      .then(d => {
        document.getElementById("modal-loading").style.display = "none";
        renderAlbumInfo(d, cachedItem, discogsUrl);
      })
      .catch(() => {
        document.getElementById("modal-loading").textContent = "Failed to load.";
      });
  }

  function closeModal() {
    document.getElementById("modal-overlay").classList.remove("open");
  }

  document.getElementById("modal-overlay").addEventListener("click", e => {
    if (e.target === document.getElementById("modal-overlay")) closeModal();
  });

  document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeModal();
  });

  // ── Album info panel ──────────────────────────────────────────────────────
  function renderAlbumInfo(d, searchResult, discogsUrl = "") {
    const el = document.getElementById("album-info");

    const title    = d.title ?? searchResult.title ?? "";
    const artists  = (d.artists ?? []).map(a => a.name).join(", ")
                     || (searchResult.title ?? "").split(" - ")[0] || "";
    const year     = d.year ?? searchResult.year ?? "";
    const labels   = (d.labels ?? []).map(l => l.name).slice(0, 2).join(", ")
                     || (searchResult.label ?? []).slice(0, 2).join(", ");
    const genres   = [...(d.genres ?? []), ...(d.styles ?? [])].slice(0, 4).join(" · ");
    const country  = d.country ?? searchResult.country ?? "";
    const img      = d.images?.[0]?.uri ?? searchResult.cover_image ?? "";
    const released    = d.released ?? "";
    const formats     = (d.formats ?? []).map(f =>
      [f.name, ...(f.descriptions ?? [])].filter(Boolean).join(" · ")
    ).join("; ") || (searchResult.format ?? []).join(" · ");
    const credits     = (d.extraartists ?? [])
      .map(a => `${escHtml(a.name)}${a.role ? ` <span class="credit-role">(${escHtml(a.role)})</span>` : ""}`)
      .join(" · ");
    const notes       = d.notes ? stripDiscogsMarkup(d.notes) : "";
    const typeLabel   = searchResult.type === "master" ? "Master Release" : searchResult.type === "release" ? "Release" : "";

    // Build video title → URL map for matching to tracks
    const videoMap = new Map();
    for (const v of (d.videos ?? [])) {
      if (v.title && v.uri) videoMap.set(v.title.toLowerCase(), v.uri);
    }
    function findVideo(trackTitle) {
      const tl = trackTitle.toLowerCase();
      for (const [vt, uri] of videoMap) {
        if (vt.includes(tl) || tl.includes(vt)) return uri;
      }
      return null;
    }

    const detailRows = [
      labels  ? `<span class="detail-label">Label</span><span>${escHtml(labels)}</span>`   : "",
      formats ? `<span class="detail-label">Format</span><span>${escHtml(formats)}</span>` : "",
      country ? `<span class="detail-label">Country</span><span>${escHtml(country)}</span>` : "",
      genres  ? `<span class="detail-label">Genre</span><span>${escHtml(genres)}</span>`   : "",
      year    ? `<span class="detail-label">Year</span><span>${escHtml(String(year))}</span>` : "",
    ].filter(Boolean).join("");

    const tracks = (d.tracklist ?? []).filter(t => t.type_ !== "heading");
    const trackHTML = tracks.length ? `
      <div class="album-tracklist">
        <div class="tracklist-heading">Tracklist</div>
        ${tracks.map(t => {
          const url = findVideo(t.title || "");
          const titleEl = url
            ? `<a class="track-link" href="${url}" target="_blank" rel="noopener">${escHtml(t.title || "")}</a>`
            : escHtml(t.title || "");
          return `<div class="track">
            <span class="track-pos">${escHtml(t.position || "")}</span>
            <span class="track-title">${titleEl}</span>
            ${t.duration ? `<span class="track-dur">${escHtml(t.duration)}</span>` : ""}
          </div>`;
        }).join("")}
      </div>` : "";

    const metaRows = [
      released ? `<div class="album-meta-row"><span class="meta-label">Released</span><span>${escHtml(released)}</span></div>` : "",
      formats  ? `<div class="album-meta-row"><span class="meta-label">Format</span><span>${escHtml(formats)}</span></div>` : "",
      credits  ? `<div class="album-meta-row"><span class="meta-label">Credits</span><span>${credits}</span></div>` : "",
      notes    ? `<div class="album-notes"><div class="tracklist-heading" style="margin-top:0.5rem">Notes</div>${escHtml(notes)}</div>` : "",
    ].filter(Boolean).join("");

    el.innerHTML = `
      <div class="album-header">
        ${img ? `<img class="album-cover" src="${img}" alt="${escHtml(title)}" loading="lazy" />`
               : `<div class="album-cover-placeholder">♪</div>`}
        <div class="album-meta">
          ${typeLabel ? `<div class="album-type-badge">${escHtml(typeLabel)}</div>` : ""}
          <h2>${escHtml(title)}</h2>
          ${artists ? `<div class="album-artist">${escHtml(artists)}</div>` : ""}
          ${detailRows ? `<div class="album-detail-grid">${detailRows}</div>` : ""}
          ${discogsUrl ? `<a href="${discogsUrl}" target="_blank" rel="noopener" style="font-size:0.75rem;color:var(--accent);text-decoration:none;margin-top:0.5rem;display:inline-block">View on Discogs ↗</a>` : ""}
        </div>
      </div>
      ${trackHTML}
      ${metaRows ? `<div class="album-extra">${metaRows}</div>` : ""}`;
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function setStatus(msg, isError = false) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = isError ? "error" : "";
  }

  function stripDiscogsMarkup(text) {
    return text
      .replace(/\[a=([^\]]+)\]/g, '$1')                   // [a=Name] → Name
      .replace(/\[l=([^\]]+)\]/g, '$1')                   // [l=Label] → Label
      .replace(/\[url=[^\]]*\]([^\[]*)\[\/url\]/g, '$1')  // [url=...]text[/url] → text
      .replace(/\[[a-z]\]([^\[]*)\[\/[a-z]\]/g, '$1')     // [i]...[/i] etc → text
      .replace(/\[[^\]]+\]/g, '')                          // remove ID-only tags [r=123], [m=123], [a123]
      .replace(/\s+([.,])/g, '$1')                         // fix "word ." → "word."
      .replace(/\s{2,}/g, ' ')                             // collapse multiple spaces
      .trim();
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // Submit on Enter
  document.getElementById("query").addEventListener("keydown", e => {
    if (e.key === "Enter") doSearch(1);
  });
</script>
</body>
</html>
