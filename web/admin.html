<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Theme bootstrap — same as index.html. Must run before any paint.
       Server-injected site theme wins over local storage. -->
  <script>(function(){try{var s="<!--SD_THEME_INJECT-->";var t=(s&&/^[a-z0-9-]+$/.test(s))?s:localStorage.getItem("sd-theme");if(t&&/^[a-z0-9-]+$/.test(t))document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
  <title>SeaDisco — Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💿</text></svg>">
  <link rel="preconnect" href="https://clerk.seadisco.com" crossorigin />
  <!--CLERK_SCRIPT_INJECT-->
  <link rel="stylesheet" href="/style.css?v=260715.7084eecc" />
</head>
<body>

<header id="site-header"></header>
<script defer src="/utils.js?v=260715.7084eecc"></script>
<script defer src="/shared.js?v=260715.7084eecc"></script>
<script>document.addEventListener("DOMContentLoaded", () => renderSharedHeader({ iconNav: true }));</script>

<!-- Thin shell only. The dashboard markup lives in the requireAdmin-
     gated /admin-panel.html fragment; admin.js fetches it into
     #admin-content once auth resolves. The same fragment powers the
     inline /?v=admin view on index.html, so there is exactly one copy
     of the admin markup to maintain. -->
<main>
  <div class="account-box admin-box">

    <div id="admin-loading-section">
      <p style="color:var(--muted)">Checking access...</p>
    </div>

    <div id="admin-denied-section" style="display:none">
      <p style="color:#e88">Access denied. Admin only.</p>
    </div>

    <div id="admin-content" style="display:none"></div>
  </div>
</main>

<!-- Album popup (shared modal.js) -->
<div id="modal-overlay">
  <div id="modal-box">
    <button id="modal-close" onclick="closeModal()">×</button>
    <button class="popup-share" onclick="sharePopup(this)">share</button>
    <div id="modal-loading">Loading…</div>
    <div id="album-info"></div>
  </div>
</div>
<div id="bio-full-overlay">
  <div id="bio-full-box">
    <button id="bio-full-close" onclick="closeBioFull()">×</button>
    <div id="bio-full-name"></div>
    <div id="bio-full-text"></div>
  </div>
</div>
<div id="lightbox-overlay" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">×</button>
  <button id="lightbox-prev" onclick="lightboxStep(event,-1)">&#8592;</button>
  <img id="lightbox-img" src="" alt="" />
  <button id="lightbox-next" onclick="lightboxStep(event,1)">&#8594;</button>
  <div id="lightbox-counter"></div>
</div>
<script defer src="/modal.js?v=260715.7084eecc"></script>
<script defer src="/blues-admin.js?v=260715.7084eecc"></script>

<footer></footer>
<script>document.addEventListener("DOMContentLoaded", () => renderSharedFooter());</script>

<script defer src="/admin.js?v=260715.7084eecc"></script>

</body>
</html>
